<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОГЭ по физике — Физические понятия (задание №1)</title>
<style>
  :root{
    --bg: #f4f1ea;
    --paper: #ffffff;
    --ink: #23252b;
    --muted: #6b6f7a;
    --accent: #b5533c;
    --accent-dark: #8f3f2c;
    --good: #3f7a4f;
    --good-bg: #e8f3ea;
    --bad: #b5533c;
    --bad-bg: #fbeae6;
    --line: #e3ddd0;
    --letter-bg: #2f3138;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: "Georgia", "Iowan Old Style", "Times New Roman", serif;
    line-height:1.5;
    padding-bottom: 80px;
  }
  header{
    background: var(--letter-bg);
    color: #f4f1ea;
    padding: 28px 20px 22px;
    text-align:center;
    position:relative;
  }
  header h1{
    margin:0 0 6px;
    font-size: clamp(20px, 4vw, 30px);
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  header p{
    margin:0;
    color:#cfcbc0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size:13px;
    letter-spacing:0.4px;
    text-transform:uppercase;
  }
  .toolbar{
    max-width: 760px;
    margin: 18px auto 0;
    padding: 0 16px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }
  .progress{
    font-size:13px;
    color: var(--muted);
  }
  .progress b{ color:var(--ink); }
  .reset-btn{
    background:none;
    border:1px solid var(--line);
    color: var(--muted);
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    cursor:pointer;
    font-family: inherit;
  }
  .reset-btn:hover{ border-color: var(--accent); color: var(--accent); }

  main{
    max-width: 760px;
    margin: 18px auto 0;
    padding: 0 16px;
    display:flex;
    flex-direction:column;
    gap: 18px;
  }

  .task{
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px 22px 18px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .task-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:10px;
    margin-bottom: 10px;
    flex-wrap:wrap;
  }
  .task-num{
    font-weight:700;
    font-size:17px;
    color: var(--accent-dark);
  }
  .task-code{
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size:11px;
    color: var(--muted);
    letter-spacing:0.3px;
  }
  .task-prompt{
    font-size:14px;
    color: var(--muted);
    margin: 0 0 14px;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }

  .columns{
    display:grid;
    grid-template-columns: 1fr;
    gap: 18px;
    margin-bottom: 14px;
  }
  @media(min-width:600px){
    .columns{ grid-template-columns: 1fr 1fr; }
  }
  .col-title{
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin: 0 0 8px;
  }
  .row{
    display:flex;
    align-items:flex-start;
    gap:8px;
    margin-bottom:8px;
    font-size:15px;
  }
  .row .num{
    flex:none;
    width: 20px;
    color: var(--muted);
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size:13px;
    padding-top:1px;
  }
  .row .letter-badge{
    flex:none;
    width: 22px;
    height:22px;
    border-radius:5px;
    background: var(--letter-bg);
    color:#f4f1ea;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size:12px;
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .answer-block{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  .answer-item{
    display:flex;
    align-items:center;
    gap:8px;
    background: #faf8f3;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
  }
  .answer-item .letter-badge{
    flex:none;
  }
  .answer-item select{
    flex:1;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    padding: 5px 6px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
  }
  .answer-item select:disabled{
    opacity: 0.85;
  }

  .actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  button.act{
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    font-weight:600;
    letter-spacing:0.2px;
    padding: 9px 16px;
    border-radius: 22px;
    border: none;
    cursor:pointer;
    transition: transform 0.05s ease;
  }
  button.act:active{ transform: scale(0.97); }
  .btn-check{
    background: var(--accent);
    color: #fff;
  }
  .btn-check:hover{ background: var(--accent-dark); }
  .btn-check:disabled{
    background:#cfc7b8;
    cursor:default;
  }
  .btn-explain{
    background: none;
    border: 1px solid var(--line);
    color: var(--muted);
    display:none;
  }
  .btn-explain.show{ display:inline-block; }
  .btn-explain:hover{ border-color: var(--accent); color: var(--accent); }

  .btn-retry{
    background: var(--letter-bg);
    border: 1px solid var(--letter-bg);
    color: #fff;
    display:none;
  }
  .btn-retry.show{ display:inline-block; }
  .btn-retry:hover{ background:#45474f; }

  .stars{
    display:none;
    gap: 6px;
    margin-top: 10px;
    font-size: 26px;
    line-height:1;
    letter-spacing: 4px;
  }
  .stars.show{ display:flex; }
  .stars .star{
    color: #ddd6c4;
    transition: color 0.15s ease, transform 0.15s ease;
  }
  .stars .star.filled{
    color: #e0a72e;
    transform: scale(1.08);
  }

  .result{
    margin-top: 12px;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    font-weight:600;
    display:none;
    padding: 8px 12px;
    border-radius: 8px;
  }
  .result.good{ display:block; background: var(--good-bg); color: var(--good); }
  .result.bad{ display:block; background: var(--bad-bg); color: var(--bad); }

  .explanation{
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
    font-size: 14.5px;
    display:none;
  }
  .explanation.show{ display:block; }
  .explanation p{ margin: 4px 0; }
  .explanation .exp-letter{
    font-weight:700;
    color: var(--accent-dark);
  }

  select.correct-mark{ border-color: var(--good) !important; background: var(--good-bg); }
  select.wrong-mark{ border-color: var(--bad) !important; background: var(--bad-bg); }

  footer{
    text-align:center;
    color: var(--muted);
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 12px;
    margin-top: 30px;
    padding: 0 16px;
  }

  .filterbar{
    max-width:760px;
    margin: 14px auto 0;
    padding: 0 16px;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }
  .filterbar input{
    width:100%;
    padding: 10px 14px;
    border-radius: 22px;
    border: 1px solid var(--line);
    font-size: 14px;
    font-family: inherit;
    background: #fff;
  }
  .task.hidden{ display:none; }
</style>
</head>

    // Actions
    const actions = document.createElement("div");
    actions.className = "actions";
    const checkBtn = document.createElement("button");
    checkBtn.className = "act btn-check";
    checkBtn.textContent = "Проверить ответ";
    const explainBtn = document.createElement("button");
    explainBtn.className = "act btn-explain";
    explainBtn.textContent = "Показать пояснение";
    const retryBtn = document.createElement("button");
    retryBtn.className = "act btn-retry";
    retryBtn.textContent = "Ответить ещё раз";
    actions.appendChild(checkBtn);
    actions.appendChild(explainBtn);
    actions.appendChild(retryBtn);
    wrap.appendChild(actions);

    // Result + explanation
    const result = document.createElement("div");
    result.className = "result";
    wrap.appendChild(result);

    const stars = document.createElement("div");
    stars.className = "stars";
    stars.innerHTML =
      '<span class="star" data-i="1">★</span><span class="star" data-i="2">★</span>';
    wrap.appendChild(stars);

    const explanation = document.createElement("div");
    explanation.className = "explanation";
    let expHtml = "";
    task.left.forEach((leftText, i) => {
      const correctIndex = task.ans[i] - 1;
      const rightText = task.right[correctIndex];
      expHtml +=
        "<p><span class='exp-letter'>" + letters[i] + "</span> — «" +
        leftText + "» соответствует примеру " + task.ans[i] + " — «" +
        rightText + "».</p>";
    });
    explanation.innerHTML = expHtml;
    wrap.appendChild(explanation);

    checkBtn.addEventListener("click", () => {
      let allFilled = selects.every((s) => s.value !== "");
      if (!allFilled) {
        result.className = "result bad";
        result.textContent = "Заполните все поля ответа перед проверкой.";
        return;
      }
      let allCorrect = true;
      let mistakes = 0;
      selects.forEach((s, i) => {
        const isCorrect = parseInt(s.value, 10) === task.ans[i];
        s.classList.remove("correct-mark", "wrong-mark");
        s.classList.add(isCorrect ? "correct-mark" : "wrong-mark");
        s.disabled = true;
        if (!isCorrect) {
          allCorrect = false;
          mistakes++;
        }
      });
      checkBtn.disabled = true;
      explainBtn.classList.add("show");
      retryBtn.classList.add("show");
      result.className = "result " + (allCorrect ? "good" : "bad");
      result.textContent = allCorrect
        ? "Верно! Все соответствия установлены правильно."
        : "Есть ошибки — неверные поля подсвечены. Посмотрите пояснение ниже.";

      const earnedStars = mistakes === 0 ? 2 : mistakes === 1 ? 1 : 0;
      stars.classList.add("show");
      stars.querySelectorAll(".star").forEach((st) => {
        const filled = parseInt(st.dataset.i, 10) <= earnedStars;
        st.classList.toggle("filled", filled);
      });
      stars.dataset.earned = earnedStars;

      if (!solved.has(index)) {
        solved.add(index);
        updateProgress();
      }
    });

    explainBtn.addEventListener("click", () => {
      explanation.classList.toggle("show");
      explainBtn.textContent = explanation.classList.contains("show")
        ? "Скрыть пояснение"
        : "Показать пояснение";
    });

    retryBtn.addEventListener("click", () => {
      wrap._reset();
      updateProgress();
      wrap.scrollIntoView({ behavior: "smooth", block: "center" });
    });

    wrap._reset = function () {
      selects.forEach((s) => {
        s.value = "";
        s.disabled = false;
        s.classList.remove("correct-mark", "wrong-mark");
      });
      checkBtn.disabled = false;
      explainBtn.classList.remove("show");
      explainBtn.textContent = "Показать пояснение";
      retryBtn.classList.remove("show");
      explanation.classList.remove("show");
      result.className = "result";
      result.textContent = "";
      stars.classList.remove("show");
      stars.querySelectorAll(".star").forEach((st) => st.classList.remove("filled"));
      delete stars.dataset.earned;
      solved.delete(index);
    };

    return wrap;
  }

  const taskEls = [];
  TASKS.forEach((task, i) => {
    const el = buildTask(task, i);
    listEl.appendChild(el);
    taskEls.push(el);
  });
  updateProgress();

  resetAllBtn.addEventListener("click", () => {
    taskEls.forEach((el) => el._reset());
    updateProgress();
  });

  searchBox.addEventListener("input", () => {
    const q = searchBox.value.trim().toLowerCase();
    taskEls.forEach((el) => {
      el.classList.toggle("hidden", q !== "" && !el.dataset.search.includes(q));
    });
  });
})();

</script>
</body>
</html>
